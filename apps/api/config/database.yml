default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  username: <%= ENV.fetch("DB_USERNAME", "inboxed") %>
  password: <%= ENV.fetch("DB_PASSWORD", "inboxed") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

development:
  <<: *default
  database: inboxed_development

test:
  <<: *default
  database: inboxed_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: inboxed_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: inboxed_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: inboxed_production_cable
    migrations_paths: db/cable_migrate
