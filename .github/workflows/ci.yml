name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            dashboard:
              - 'apps/dashboard/**'
            mcp:
              - 'apps/mcp/**'

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inboxed
          POSTGRES_PASSWORD: inboxed
          POSTGRES_DB: inboxed_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api
      - name: Setup DB
        env:
          DATABASE_URL: postgresql://inboxed:inboxed@localhost:5432/inboxed_test
          RAILS_ENV: test
        run: bin/rails db:setup
      - name: Lint
        run: bundle exec standardrb
      - name: Test
        env:
          DATABASE_URL: postgresql://inboxed:inboxed@localhost:5432/inboxed_test
          RAILS_ENV: test
        run: bundle exec rspec

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Dashboard
        if: needs.changes.outputs.dashboard == 'true'
        working-directory: apps/dashboard
        run: |
          npm ci --legacy-peer-deps
          npm run lint
          npm run check
          npm run build

      - name: MCP
        if: needs.changes.outputs.mcp == 'true'
        working-directory: apps/mcp
        run: |
          npm ci
          npm run check
          npm run build
