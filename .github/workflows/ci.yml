name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Rails)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inboxed
          POSTGRES_PASSWORD: inboxed
          POSTGRES_DB: inboxed_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api
      - name: Setup DB
        env:
          DATABASE_URL: postgresql://inboxed:inboxed@localhost:5432/inboxed_test
          RAILS_ENV: test
        run: bin/rails db:setup
      - name: Run linter
        run: bundle exec standardrb
      - name: Run tests
        env:
          DATABASE_URL: postgresql://inboxed:inboxed@localhost:5432/inboxed_test
          RAILS_ENV: test
        run: bundle exec rspec

  dashboard:
    name: Dashboard (Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/mcp/package-lock.json
      - run: npm ci
      - run: npm run build
