limit:
  name: limit
  in: query
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
  description: Maximum items per page

after:
  name: after
  in: query
  schema:
    type: string
  description: Cursor for next page (from pagination.next_cursor)

endpointToken:
  name: token
  in: path
  required: true
  schema:
    type: string
  description: "Endpoint token (e.g., wh_abc123)"

webhookId:
  name: webhook_id
  in: path
  required: true
  schema:
    type: string
    format: uuid
