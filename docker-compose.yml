# Production / self-hosting docker-compose
# Usage: bin/setup && docker compose up -d

services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - "${INBOXED_API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://inboxed:${POSTGRES_PASSWORD:-inboxed}@db:5432/inboxed_production
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      INBOXED_ADMIN_TOKEN: ${INBOXED_ADMIN_TOKEN:?Set INBOXED_ADMIN_TOKEN in .env}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "${INBOXED_WEB_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build:
      context: apps/mcp
      dockerfile: Dockerfile
    ports:
      - "${INBOXED_MCP_PORT:-3001}:3001"
    environment:
      INBOXED_API_URL: http://api:3000
      INBOXED_API_KEY: ${INBOXED_MCP_KEY:-}
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: inboxed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inboxed}
      POSTGRES_DB: inboxed_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inboxed"]
      interval: 5s
      timeout: 5s
      retries: 5
    # mem_limit: 512m  # Uncomment to limit memory usage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    # mem_limit: 256m  # Uncomment to limit memory usage

volumes:
  pgdata:
  redisdata:
