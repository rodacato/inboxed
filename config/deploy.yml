# Kamal deploy configuration for Inboxed
# Docs: https://kamal-deploy.org/docs
#
# Prerequisites:
#   1. Set KAMAL_REGISTRY_PASSWORD (GitHub PAT with packages:write)
#   2. Set HOST_IP environment variable or replace below
#   3. SSH access to the VPS configured
#   4. GitHub secrets configured (see docs/guides/kamal-deploy.md)

service: inboxed

image: ghcr.io/<%= ENV.fetch("GITHUB_REPOSITORY", "your-org/inboxed").split("/").first %>/inboxed-api

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>
    options:
      network: "kamal"
    env:
      clear:
        SOLID_QUEUE_IN_PUMA: true

  smtp:
    hosts:
      - <%= ENV["HOST_IP"] %>
    cmd: bundle exec rails runner "Inboxed::SmtpServer.start"
    options:
      network: "kamal"
      publish:
        - "${INBOXED_SMTP_PORT:-2525}:2525"
        - "${INBOXED_SMTPS_PORT:-465}:465"

# Cloudflared handles TLS — kamal-proxy only routes internally
proxy:
  ssl: false
  host: <%= ENV.fetch("INBOXED_DOMAIN", "inboxed.example.com") %>
  app_port: 3000

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  dockerfile: apps/api/Dockerfile
  context: apps/api

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    INBOXED_DOMAIN: <%= ENV.fetch("INBOXED_DOMAIN", "inboxed.example.com") %>
    INBOXED_BASE_URL: https://<%= ENV.fetch("INBOXED_DOMAIN", "inboxed.example.com") %>
    DASHBOARD_URL: https://<%= ENV.fetch("INBOXED_DOMAIN", "inboxed.example.com") %>
    REGISTRATION_MODE: <%= ENV.fetch("REGISTRATION_MODE", "closed") %>
    TRIAL_DURATION_DAYS: <%= ENV.fetch("TRIAL_DURATION_DAYS", "7") %>
    EMAIL_TTL_HOURS: <%= ENV.fetch("EMAIL_TTL_HOURS", "168") %>
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - INBOXED_SETUP_TOKEN
    - REDIS_URL
    - OUTBOUND_SMTP_HOST
    - OUTBOUND_FROM_EMAIL
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET

accessories:
  dashboard:
    image: ghcr.io/<%= ENV.fetch("GITHUB_REPOSITORY", "your-org/inboxed").split("/").first %>/inboxed-dashboard
    host: <%= ENV["HOST_IP"] %>
    port: "8080:80"
    options:
      network: "kamal"

  mcp:
    image: ghcr.io/<%= ENV.fetch("GITHUB_REPOSITORY", "your-org/inboxed").split("/").first %>/inboxed-mcp
    host: <%= ENV["HOST_IP"] %>
    port: "3001:3001"
    env:
      clear:
        INBOXED_API_URL: http://inboxed-web:3000
      secret:
        - INBOXED_MCP_KEY
    options:
      network: "kamal"

  db:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: inboxed_production
        POSTGRES_USER: inboxed
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    options:
      network: "kamal"

  redis:
    image: redis:7-alpine
    host: <%= ENV["HOST_IP"] %>
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
    options:
      network: "kamal"
