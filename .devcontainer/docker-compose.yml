services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/inboxed:cached
      # Persist shell history and gems between rebuilds
      - bash-history:/home/vscode/.bash_history_dir
      - bundle-cache:/usr/local/bundle
      - node-modules-cache:/usr/local/share/nvm
    command: sleep infinity
    network_mode: service:db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5632:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: inboxed
      POSTGRES_PASSWORD: inboxed
      POSTGRES_DB: inboxed_development

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6579:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  bash-history:
  bundle-cache:
  node-modules-cache:
